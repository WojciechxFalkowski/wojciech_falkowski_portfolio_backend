version: '3.7'
services:
  portfolio_backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio
    env_file:
      - .env
    ports:
      - ${PORT}:${PORT}
    volumes:
      - ./src:/app/src
    networks:
      - portfolio

# before first run -> docker network create portfolio
networks:
  portfolio:
    external: true